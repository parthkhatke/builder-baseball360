name: wf-basebaslll-sc
version: v1
type: workflow
workspace: public
layer: user
tags:
  - Tier.Gold
  - SemanticModelAgent
description: Scanner workflow for consumer-aligned data product basebaslll
  (metadata registration in DataOS).
workflow:
  dag:
    - name: basebaslll-scan
      description: Scanner for basebaslll (data product metadata registration).
      spec:
        stack: scanner:2.0
        compute: runnable-default
        stackSpec:
          type: data-product
          sourceConfig:
            config:
              type: DataProductMetadata
              markDeletedDataProducts: true
              dataProductFilterPattern:
                includes:
                  - basebaslll
