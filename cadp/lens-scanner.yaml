name: wf-base-ball-365-sc
version: v1
type: workflow
workspace: public
layer: user
tags:
  - Tier.Gold
  - SemanticModelAgent
description: Scanner workflow for consumer-aligned data product base-ball-365
  (metadata registration in DataOS).
workflow:
  dag:
    - name: base-ball-365-scan
      description: Scanner for base-ball-365 (data product metadata registration).
      spec:
        stack: scanner:2.0
        compute: runnable-default
        stackSpec:
          type: data-product
          sourceConfig:
            config:
              type: DataProductMetadata
              markDeletedDataProducts: true
              dataProductFilterPattern:
                includes:
                  - base-ball-365
