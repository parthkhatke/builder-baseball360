version: v1
type: instance-secret
tags:
  - dataos:type:resource
  - dataos:type:cluster-resource
  - dataos:resource:instance-secret
  - dataos:layer:user
description: Git read/write secret for the lens model repository.
layer: user
name: base-ball-365-lens
instance-secret:
  type: key-value
  acl: rw
  data:
    GITSYNC_USERNAME: "{GITSYNC_USERNAME}"
    GITSYNC_PASSWORD: "{GITSYNC_PASSWORD}"
